services:
  - type: web
    name: talentscope-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CATALOG_PATH
        value: data/catalog.json
      - key: LOG_LEVEL
        value: INFO
